# Strangler proxy overlay — `docker compose -f docker-compose.yml -f docker-compose.strangler.yml up -d`
#
# 전제: 호스트에서 chat-api(:8081), 선택적으로 legacy(:8080) 기동
# 프록시: http://localhost:8088

services:
  strangler-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    environment:
      CHAT_API_UPSTREAM: ${CHAT_API_UPSTREAM:-host.docker.internal:8081}
      LEGACY_UPSTREAM: ${LEGACY_UPSTREAM:-host.docker.internal:8080}
    volumes:
      - ./nginx/strangler.conf.template:/etc/nginx/templates/strangler.conf.template:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
