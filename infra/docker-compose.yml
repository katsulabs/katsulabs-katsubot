services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: katsubot
      POSTGRES_PASSWORD: katsubot
      POSTGRES_DB: katsubot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katsubot -d katsubot"]
      interval: 5s
      timeout: 5s
      retries: 5

  dummy-rag:
    build: ./dummy-rag
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 5
