# katsubot — AI Gateway (WRTN + /v1/completions)
#
# 권장: katsulabs-ai-gateway 정식 compose (hyobee-rag-db 연동)
#   cp infra/.env.example infra/.env   # 값 채우기
#   ./scripts/up-ai-gateway.sh
#
# katsubot-api completions 만: GATEWAY_WRTN_ENABLED=false

services:
  ai-gateway:
    image: katsubot-ai-gateway
    build:
      context: ${AI_GATEWAY_REPO:-../katsulabs-ai-gateway}/services/gateway-java
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8090}:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8090"
      GATEWAY_WRTN_ENABLED: ${GATEWAY_WRTN_ENABLED:-true}
      GATEWAY_FLYWAY_ENABLED: ${GATEWAY_FLYWAY_ENABLED:-false}
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:${HYOBEE_JWT_SECRET:${KATSUBOT_AUTH_JWT_SECRET:-}}}
      GATEWAY_DEV_USER_ID: ${GATEWAY_DEV_USER_ID:-test20230128}
      GATEWAY_DEV_CORP_CODE: ${GATEWAY_DEV_CORP_CODE:-00}
      GATEWAY_DEV_PG_CODE: ${GATEWAY_DEV_PG_CODE:-H}
      GATEWAY_DEV_PU_CODE: ${GATEWAY_DEV_PU_CODE:-H01}
      GATEWAY_DEV_TEAM_CODE: ${GATEWAY_DEV_TEAM_CODE:-65H00}
      GATEWAY_DEV_ROLES: ${GATEWAY_DEV_ROLES:-ROLE_USER,ROLE_ADMIN}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      LLM_API_KEY: ${LLM_API_KEY:-${GEMINI_API_KEY:-${GOOGLE_API_KEY:-ollama}}}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8090/_health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
