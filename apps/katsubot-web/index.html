<!doctype html>
<html lang="ko">
  <head>
    <script>
      (function () {
        var key = 'katsubotUiTheme'
        var allowed = { light: 1, dark: 1, gray: 1 }
        var theme = 'dark'
        try {
          var stored = localStorage.getItem(key)
          if (stored && allowed[stored]) {
            theme = stored
          }
        } catch (ignore) {}
        document.documentElement.setAttribute('data-ui-theme', theme)
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katsubot</title>
    <link rel="icon" type="image/png" href="/katsulabs-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
