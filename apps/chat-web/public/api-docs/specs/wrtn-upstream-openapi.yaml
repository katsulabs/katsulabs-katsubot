openapi: 3.1.0
info:
  title: WRTN Upstream API (Hyobee Vendor Client)
  version: 1.0.0
  description: |
    레거시 `WrtnChatVendorClient`가 호출하는 **외부 WRTN/RAG 벤더 API** 역공학 계약.

    - 구현 근거: `legacy/hyobee/src/main/java/xs/aichat/v2/external/WrtnChatVendorClient.java`
    - HTTP 클라이언트: `HyobeeChatApiClient` (RestTemplate + WebClient SSE)
    - Base URL: `WRTN_BASEURL` (예: `https://ax-api-gateway.wrtn.ai/hsgc-demo`)
    - 인증: `Authorization: Bearer <JWT>` (세션 기반 Hyobee JWT)
    - JSON 필드명: snake_case (`@JsonNaming(SnakeCaseStrategy)` 또는 DTO 필드명)

    **주의:** Hyobee BFF(`/xs/aichat/v2/**`)와 chat-api(`/api/v1/**`) 계약과는 별도 문서입니다.
    상세 분석: `docs/modernization/wrtn-upstream-api.md`
servers:
  - url: '{wrtnBaseUrl}'
    description: WRTN API Gateway
    variables:
      wrtnBaseUrl:
        default: https://ax-api-gateway.wrtn.ai/hsgc-demo
security:
  - bearerAuth: []
tags:
  - name: health
    description: 헬스체크
  - name: conversations
    description: 대화 CRUD
  - name: messages
    description: 메시지 조회·스트리밍·중단
  - name: feedback
    description: 메시지 피드백
  - name: boards
    description: 게시판 권한
  - name: rnd
    description: R&D 저널·출처 (v2)
paths:
  /_health:
    get:
      operationId: wrtnHealthCheck
      summary: 벤더 헬스체크
      tags: [health]
      security: []
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                example:
                  status: ok
        '503':
          description: Hyobee 래퍼가 upstream 실패를 감지한 경우

  /api/v1/conversations:
    get:
      operationId: wrtnListConversations
      summary: 대화 목록 조회
      tags: [conversations]
      parameters:
        - $ref: '#/components/parameters/userIdQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/sizeQuery'
      responses:
        '200':
          description: 페이지 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsApiResponse'
    post:
      operationId: wrtnCreateConversation
      summary: 대화 생성
      tags: [conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationApiRequest'
      responses:
        '200':
          description: 생성된 대화
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationApiResponse'
    delete:
      operationId: wrtnDeleteConversations
      summary: 대화 일괄 삭제
      tags: [conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteConversationsApiRequest'
      responses:
        '200':
          description: 삭제 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConversationsApiResponse'

  /api/v1/conversations/{conversationId}/messages:
    get:
      operationId: wrtnListMessages
      summary: 메시지 목록 조회 (커서 페이지)
      tags: [messages]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - $ref: '#/components/parameters/userIdQuery'
        - name: cursor
          in: query
          schema:
            type: integer
            nullable: true
          description: 이전 페이지 next_cursor
        - $ref: '#/components/parameters/sizeQuery'
      responses:
        '200':
          description: 메시지 페이지
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesApiResponse'

  /api/v1/conversations/{conversationId}/ai-chat:
    post:
      operationId: wrtnAiChatStream
      summary: AI 채팅 SSE 스트림
      description: |
        WebClient로 `text/event-stream` 수신. 각 청크는 JSON 문자열 한 줄.
        - `status=response_chunk` → `text` 필드가 토큰 델타
        - `status=error` → `message` 또는 `error` 필드
      tags: [messages]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - name: web_search_enabled
          in: query
          required: true
          schema:
            type: string
          description: 웹 검색 사용 여부 (Hyobee는 문자열 `"true"`/`"false"` 전달)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageApiRequest'
      responses:
        '200':
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: JSON 한 줄 (`WrtnSseChunk`)

  /api/v1/conversations/{conversationId}/messages/{messageId}/interrupt:
    post:
      operationId: wrtnInterruptMessage
      summary: 스트리밍 응답 중단
      tags: [messages]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - $ref: '#/components/parameters/messageIdPath'
        - $ref: '#/components/parameters/userIdQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopMessageApiRequest'
      responses:
        '200':
          description: 중단 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopMessageApiResponse'

  /api/v1/conversations/{conversationId}/messages/{messageId}/feedback:
    put:
      operationId: wrtnUpsertFeedback
      summary: 메시지 피드백 등록/수정
      tags: [feedback]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - $ref: '#/components/parameters/messageIdPath'
        - $ref: '#/components/parameters/userIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackApiRequest'
      responses:
        '200':
          description: 피드백
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackApiResponse'

  /api/v1/conversations/{conversationId}/messages/{messageId}/feedback/{feedbackId}:
    delete:
      operationId: wrtnDeleteFeedback
      summary: 메시지 피드백 삭제
      tags: [feedback]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - $ref: '#/components/parameters/messageIdPath'
        - name: feedbackId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/userIdQuery'
      responses:
        '200':
          description: 삭제 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackApiResponse'

  /api/v1/conversations/{conversationId}/messages/{messageId}/sources:
    get:
      operationId: wrtnListMessageSources
      summary: 메시지 출처(근거) 목록
      tags: [rnd]
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - $ref: '#/components/parameters/messageIdPath'
        - $ref: '#/components/parameters/userIdQuery'
        - name: doc_type
          in: query
          schema:
            type: string
          description: paper, patent, article, internal 등
        - name: sort_by
          in: query
          schema:
            type: string
        - name: sort_order
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/sizeQuery'
      responses:
        '200':
          description: 출처 페이지
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageSourcesApiResponse'

  /api/v1/boards/auth:
    get:
      operationId: wrtnListBoardAuth
      summary: 접근 가능 게시판 목록
      description: Hyobee는 현재 쿼리 파라미터 없이 호출 (BoardAuthApiRequest 주석 처리)
      tags: [boards]
      responses:
        '200':
          description: 게시판 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardAuthApiResponse'

  /api/v2/rnd/journal:
    get:
      operationId: wrtnListJournals
      summary: R&D 저널(문헌) 목록
      description: |
        `callApiOrThrowWithViewableTeam` 사용 — sidebar 선택 팀(`JWT_TEAM_CODE`) 기준 JWT.
      tags: [rnd]
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
        - name: end_date
          in: query
          schema:
            type: string
        - name: doc_types
          in: query
          schema:
            type: string
          description: 콤마 구분 (URL decode 후 `%2C` → `,` 정규화)
        - name: keyword
          in: query
          schema:
            type: string
        - name: author
          in: query
          schema:
            type: string
          description: Hyobee `creator` → upstream `author`
        - name: unique_number
          in: query
          schema:
            type: string
          description: Hyobee `source_url` → upstream `unique_number`
        - name: journal_number
          in: query
          schema:
            type: string
          description: Hyobee `journal_id` → upstream `journal_number`
        - name: sort_by
          in: query
          schema:
            type: string
            default: latest
          description: Hyobee에서 `latest` 하드코딩
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/sizeQuery'
      responses:
        '200':
          description: 저널 페이지
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalsApiResponse'

  /api/v2/rnd/journal/{journalId}:
    get:
      operationId: wrtnGetJournalDetail
      summary: 저널 상세
      tags: [rnd]
      parameters:
        - $ref: '#/components/parameters/journalIdPath'
        - name: journal_id
          in: query
          required: true
          schema:
            type: string
          description: path와 동일 값 (Hyobee `JournalDetailRequest`)
      responses:
        '200':
          description: 저널 상세 (논문/특허/기사 필드 혼재)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetail'

  /api/v2/rnd/journal/{journalId}/related-items:
    get:
      operationId: wrtnGetJournalRelatedItems
      summary: 연관 저널/문헌
      tags: [rnd]
      parameters:
        - $ref: '#/components/parameters/journalIdPath'
        - name: journal_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 연관 항목
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalRelatedItemsResponse'

  /api/v2/rnd/journal/{journalId}/ai-summary:
    get:
      operationId: wrtnGetJournalAiSummary
      summary: 저널 AI 요약 (intro/body/conclusion)
      tags: [rnd]
      parameters:
        - $ref: '#/components/parameters/journalIdPath'
      responses:
        '200':
          description: AI 요약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalApiAiSummaryResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Hyobee 세션에서 발급한 JWT (로그인 팀 코드 포함)

  parameters:
    conversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    messageIdPath:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    journalIdPath:
      name: journalId
      in: path
      required: true
      schema:
        type: string
    userIdQuery:
      name: user_id
      in: query
      required: true
      schema:
        type: string
    pageQuery:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    sizeQuery:
      name: size
      in: query
      schema:
        type: integer
        default: 20

  schemas:
    WrtnSseChunk:
      type: object
      properties:
        status:
          type: string
          enum: [response_chunk, error]
        text:
          type: string
          description: status=response_chunk 일 때 토큰 텍스트
        message:
          type: string
          description: status=error 일 때 오류 메시지
        error:
          type: string
          description: status=error 대체 필드

    AttachFileInfo:
      type: object
      properties:
        filename:
          type: string
        mime_type:
          type: string
        content:
          type: string
          description: Base64 등 파일 본문 (업스트림 계약은 구현 의존)
        size:
          type: integer
        thumbnail_id:
          type: string

    ConversationsApiResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ConversationApiItem'
        page:
          type: integer
        size:
          type: integer
        total_count:
          type: integer
        has_next:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean

    ConversationApiItem:
      type: object
      properties:
        conversation_id:
          type: integer
        title:
          type: string
        chat_category:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    CreateConversationApiRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        user_query:
          type: string
          description: 첫 질문 (제목 생성용)
        chat_category:
          type: string

    CreateConversationApiResponse:
      allOf:
        - $ref: '#/components/schemas/ConversationApiItem'

    DeleteConversationsApiRequest:
      type: object
      required: [user_id, conversation_ids]
      properties:
        user_id:
          type: string
        conversation_ids:
          type: array
          items:
            type: string

    DeleteConversationsApiResponse:
      type: object
      properties:
        status:
          type: integer
        user_id:
          type: string
        deleted_date:
          type: string
        deleted_count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/DeleteConversationResultApiItem'

    DeleteConversationResultApiItem:
      type: object
      properties:
        status:
          type: integer
        conversation_id:
          type: integer
        chat_category:
          type: string

    MessagesApiResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MessageApiItem'
        size:
          type: integer
        total_count:
          type: integer
        has_next:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        next_cursor:
          type: string

    MessageApiItem:
      type: object
      properties:
        message_id:
          type: integer
        content:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/MessageSourceInline'
        source_headers:
          $ref: '#/components/schemas/SourceHeaderCounts'
        role:
          type: string
          enum: [user, assistant, system]
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
            description: filename, mime_type, thumbnail_id 등. Hyobee가 image면 thumbnail_image(base64) 보강
        feedback:
          $ref: '#/components/schemas/FeedbackApiResponse'
        created_at:
          type: string

    MessageSourceInline:
      type: object
      properties:
        source_type:
          type: string
        display_title:
          type: string
        source_title:
          type: string
        url:
          type: string
        source_id:
          type: string
        doc_type:
          type: string
        snippet:
          type: string
        author:
          type: string
        date:
          type: string
        similarity:
          type: number
          format: double
        source_name:
          type: string
        meta:
          type: string
        board_id:
          type: string
          description: doc_type=internal 일 때

    SourceHeaderCounts:
      type: object
      properties:
        total_count:
          type: integer
        paper:
          type: integer
        patent:
          type: integer
        article:
          type: integer
        internal:
          type: integer

    SendMessageApiRequest:
      type: object
      required: [conversation_id, user_id, message]
      properties:
        conversation_id:
          type: string
        user_id:
          type: string
        chat_category:
          type: string
        message:
          type: string
        files:
          type: array
          items:
            $ref: '#/components/schemas/AttachFileInfo'
        web_search_enabled:
          type: string
          description: query param으로도 전달됨

    StopMessageApiRequest:
      type: object
      properties:
        conversation_id:
          type: string
        message_id:
          type: string
        user_id:
          type: string

    StopMessageApiResponse:
      type: object
      properties:
        conversation_id:
          type: string
        return_stop:
          type: string

    FeedbackApiRequest:
      type: object
      required: [feedback_type]
      properties:
        feedback_type:
          type: string
          description: like, dislike 등

    FeedbackApiResponse:
      type: object
      properties:
        feedback_id:
          type: string
        message_id:
          type: string
        feedback_type:
          type: string

    BoardAuthApiResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BoardAuthApiItem'

    BoardAuthApiItem:
      type: object
      properties:
        board_name:
          type: string

    MessageSourcesApiResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/MessageSourceApiItem'
        total_count:
          type: integer
        page:
          type: integer
        size:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        category_counts:
          type: object
          properties:
            paper:
              type: integer
            patent:
              type: integer
            article:
              type: integer
            internal:
              type: integer
            total_count:
              type: integer

    MessageSourceApiItem:
      type: object
      properties:
        reference_index:
          type: string
        source_id:
          type: string
        doc_type:
          type: string
        doc_type_label:
          type: string
        title:
          type: string
        author:
          type: string
        date:
          type: string
        similarity:
          type: number
          format: double
        url:
          type: string
        source_name:
          type: string
        board_id:
          type: string

    JournalsApiResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/JournalApiItem'
        total_count:
          type: integer
        page:
          type: integer
        size:
          type: integer
        has_next:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        total_pages:
          type: integer

    JournalApiItem:
      type: object
      description: 목록용 저널 요약 (doc_type별 필드 선택적 존재)
      additionalProperties: true
      properties:
        id:
          type: string
        doc_type:
          type: string
        doc_type_label:
          type: string
        title:
          type: string
        overview:
          type: string
        author:
          type: string
        date:
          type: string
        url:
          type: string
        ai_summary:
          $ref: '#/components/schemas/JournalApiAiSummary'

    JournalDetail:
      type: object
      description: 상세 — 논문/특허/뉴스 필드가 doc_type에 따라 채워짐
      additionalProperties: true

    JournalRelatedItemsResponse:
      type: object
      properties:
        related_items:
          type: array
          items:
            $ref: '#/components/schemas/JournalRelatedItem'
        cached:
          type: boolean

    JournalRelatedItem:
      type: object
      properties:
        title:
          type: string
        journal:
          type: string
        authors:
          type: string
        url:
          type: string
        doc_id:
          type: string
        doc_type:
          type: string
        date:
          type: string
        score:
          type: number
          format: double

    JournalApiAiSummaryResponse:
      type: object
      properties:
        ai_summary:
          $ref: '#/components/schemas/JournalApiAiSummary'
        cached:
          type: boolean

    JournalApiAiSummary:
      type: object
      properties:
        intro:
          type: string
        body:
          type: string
        conclusion:
          type: string

    ApiErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          additionalProperties: true
