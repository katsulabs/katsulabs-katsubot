name: katsubot-web CI

on:
  pull_request:
    paths:
      - 'apps/katsubot-web/**'
      - '.github/workflows/katsubot-web-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/katsubot-web/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/katsubot-web/package-lock.json
      - name: Install
        working-directory: apps/katsubot-web
        run: npm ci
      - name: Test and build
        working-directory: apps/katsubot-web
        run: npm test && npm run build
