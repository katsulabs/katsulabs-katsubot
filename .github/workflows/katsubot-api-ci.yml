name: katsubot-api CI

on:
  pull_request:
    paths:
      - 'services/katsubot-api/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/katsubot-api-ci.yml'
  push:
    branches: [main]
    paths:
      - 'services/katsubot-api/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Gradle test
        run: ./gradlew :services:katsubot-api:test --no-daemon
